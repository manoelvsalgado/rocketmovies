services:
  - type: web
    name: rocketmovies-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run api
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: rocketmovies-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /var/data/rocketmovies.sqlite
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
